<main class="login-shell">
  <button
    class="theme-toggle login-theme-toggle"
    type="button"
    (click)="alternarTema()"
    [attr.aria-label]="modoOscuro ? 'Activar modo claro' : 'Activar modo oscuro'">
    <i class="bi" [ngClass]="modoOscuro ? 'bi-sun' : 'bi-moon'"></i>
  </button>

  <div class="login-toast" *ngIf="toastMensaje" [ngClass]="toastTipo">
    <strong>{{ toastTitulo }}</strong>
    <span>{{ toastMensaje }}</span>
  </div>

  <section class="login-brand">
    <div class="brand-mark">TN</div>
    <span class="brand-kicker">TELNETCOM PERU SAC</span>
    <h1>Gestion profesional de incidencias tecnicas</h1>
    <p>
      Plataforma interna para el registro de Incidencias.
    </p>

    <div class="brand-stats">
      <div>
        <strong>24/7</strong>
        <span>Seguimiento</span>
      </div>
    </div>
  </section>

  <section class="login-panel">
    <div class="login-card">
      <div class="login-heading">
        <span class="eyebrow">Acceso seguro</span>
        <h2>Iniciar Sesion</h2>
        <p>Ingresa con tu usuario asignado para continuar.</p>
      </div>

      <div class="login-notice" *ngIf="errorLogin">
        <div class="notice-icon">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 9v4m0 4h.01M10.3 3.9 2.7 17.1A2 2 0 0 0 4.4 20h15.2a2 2 0 0 0 1.7-2.9L13.7 3.9a2 2 0 0 0-3.4 0Z" />
          </svg>
        </div>
        <span>{{ errorLogin }}</span>
      </div>

      <form (ngSubmit)="login()" class="login-form">
        <div class="input-group-custom">
          <label for="usuario">Usuario</label>
          <div class="input-container">
            <svg class="field-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20 21a8 8 0 0 0-16 0" />
              <circle cx="12" cy="7" r="4" />
            </svg>
            <input
              id="usuario"
              type="text"
              placeholder="admin, tecnico o usuario"
              [(ngModel)]="usuario"
              name="usuario"
              autocomplete="username">
          </div>
        </div>

        <div class="input-group-custom">
          <label for="password">Contrasena</label>
          <div class="input-container">
            <svg class="field-icon" viewBox="0 0 24 24" aria-hidden="true">
              <rect x="4" y="11" width="16" height="9" rx="2" />
              <path d="M8 11V8a4 4 0 0 1 8 0v3" />
            </svg>
            <input
              id="password"
              [type]="mostrarPassword ? 'text' : 'password'"
              placeholder="Ingresa tu contrasena"
              [(ngModel)]="password"
              name="password"
              autocomplete="current-password">

            <button
              class="password-toggle"
              type="button"
              (click)="alternarPassword()"
              [attr.aria-label]="mostrarPassword ? 'Ocultar contrasena' : 'Mostrar contrasena'">
              <svg viewBox="0 0 24 24" aria-hidden="true" *ngIf="!mostrarPassword">
                <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
              <svg viewBox="0 0 24 24" aria-hidden="true" *ngIf="mostrarPassword">
                <path d="M3 3l18 18" />
                <path d="M10.6 10.6A2 2 0 0 0 12 14a2 2 0 0 0 1.4-.6" />
                <path d="M9.9 4.2A9.7 9.7 0 0 1 12 4c6.5 0 10 8 10 8a17.7 17.7 0 0 1-3.1 4.3" />
                <path d="M6.6 6.6C3.6 8.5 2 12 2 12s3.5 8 10 8a9.6 9.6 0 0 0 4.2-.9" />
              </svg>
            </button>
          </div>
        </div>

        <button class="login-button" type="submit" [disabled]="cargando">
          <span *ngIf="!cargando">Ingresar al sistema</span>
          <span *ngIf="cargando">Validando acceso...</span>
        </button>
      </form>
    </div>
  </section>
</main>
